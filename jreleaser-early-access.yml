project:
  name: skills
  description: The CLI for the open agent skills ecosystem (Java port)
  java:
    groupId: sh.skills
    artifactId: jskills
    mainClass: sh.skills.Skills
    version: 17
  versionPattern: CALVER

release:
  github:
    owner: jbangdev
    name: skills-java
    overwrite: true
    update:
      enabled: true
      sections:
        - ASSETS
    tagName: early-access
    releaseName: Early Access
    prerelease:
      enabled: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        enabled: true
      hide:
        categories:
          - merge

distributions:
  skills:
    type: SINGLE_JAR
    artifacts:
      - path: target/jskills-early-access.jar
