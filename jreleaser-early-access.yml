project:
  name: skills
  description: The CLI for the open agent skills ecosystem (Java port)
  languages:
    java:
      groupId: sh.skills
      artifactId: jskills
      mainClass: sh.skills.Skills
      version: 25
  snapshot:
    label: early-access
    fullChangelog: true

release:
  github:
    owner: jbangdev
    name: skills-java
    overwrite: true
    update:
      enabled: true
      sections:
        - ASSETS
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        enabled: true
      hide:
        categories:
          - merge

distributions:
  skills:
    type: SINGLE_JAR
    artifacts:
      - path: target/jskills-0.0.0-SNAPSHOT.jar
