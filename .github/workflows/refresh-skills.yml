name: Refresh Skills Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch skills from registry
        run: |
          curl -sL https://skills.sh | python3 -c "
          import sys, re, json
          html = sys.stdin.read()
          pattern = r'\\\\\\\"source\\\\\\\":\\\\\\\"([^\\\\\\\\]+)\\\\\\\",\\\\\\\"skillId\\\\\\\":\\\\\\\"([^\\\\\\\\]+)\\\\\\\",\\\\\\\"name\\\\\\\":\\\\\\\"([^\\\\\\\\]+)\\\\\\\",\\\\\\\"installs\\\\\\\":(\d+)'
          matches = re.findall(pattern, html)
          skills = []
          seen = set()
          for source, skillId, name, installs in matches:
              key = source + '/' + skillId
              if key not in seen:
                  seen.add(key)
                  skills.append({'n': name, 's': source, 'i': int(installs)})
          skills.sort(key=lambda x: -x['i'])
          with open('docs/site/skills.js', 'w') as f:
              f.write('var SKILLS=')
              json.dump(skills, f, separators=(',', ':'))
              f.write(';')
          print(f'Wrote {len(skills)} skills')
          "

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/site/skills.js
          git diff --cached --quiet || git commit -m "chore: refresh skills registry data" && git push
