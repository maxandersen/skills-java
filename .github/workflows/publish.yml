name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.5.1) — should match upstream vercel-labs/skills'
        required: true

permissions:
  contents: write

jobs:
  release-jar:
    name: Release JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set Maven version
        run: mvn --no-transfer-progress versions:set -DnewVersion=${{ steps.version.outputs.version }}

      - name: Build and test
        run: mvn --no-transfer-progress verify

      - name: Prepare release
        run: |
          mkdir -p release
          cp target/jskills-${{ steps.version.outputs.version }}-runner.jar release/jskills-${{ steps.version.outputs.version }}.jar

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        with:
          version: latest
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties

    outputs:
      version: ${{ steps.version.outputs.version }}

  release-native:
    name: Native ${{ matrix.label }}
    needs: release-jar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            artifact: skills-linux-amd64
          - os: macos-latest
            label: macos-aarch64
            artifact: skills-macos-aarch64
          - os: windows-latest
            label: windows-amd64
            artifact: skills-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Maven version
        run: mvn --no-transfer-progress versions:set -DnewVersion=${{ needs.release-jar.outputs.version }}

      - name: Build native image
        run: mvn --no-transfer-progress package -Dnative -DskipTests

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv target/jskills-${{ needs.release-jar.outputs.version }}-runner ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/jskills-${{ needs.release-jar.outputs.version }}-runner.exe ${{ matrix.artifact }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ needs.release-jar.outputs.version }} ${{ matrix.artifact }} --clobber --repo ${{ github.repository }}
