name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --no-transfer-progress verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: target/surefire-reports/

  early-access:
    name: Early Access
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set version
        run: mvn --no-transfer-progress versions:set -DnewVersion=0.0.0-SNAPSHOT

      - name: Build
        run: mvn --no-transfer-progress package -DskipTests

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        with:
          version: latest
          arguments: full-release -c jreleaser-early-access.yml
        env:
          JRELEASER_PROJECT_VERSION: 0.0.0-SNAPSHOT
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-early-access
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
